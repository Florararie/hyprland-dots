general {
    hide_cursor        = false
    ignore_empty_input = true
    text_trim          = true
}

animations {
    enabled = true

    bezier = smoothOut, 0.25, 1.0, 0.5,  1.0
    bezier = bounceOut, 0.05, 0.9, 0.1,  1.05
    bezier = linear,    1,    1,   0,    0

    animation = fadeIn,           1, 4, smoothOut
    animation = fadeOut,          1, 3, smoothOut
    animation = inputFieldColors, 1, 4, smoothOut
    animation = inputFieldFade,   1, 3, smoothOut
    animation = inputFieldWidth,  1, 4, bounceOut
    animation = inputFieldDots,   1, 2, linear
}

# background — empty monitor applies to all
background {
    monitor      =
    path         = screenshot
    color        = rgba(13, 13, 26, 1.0)

    blur_passes      = 4
    blur_size        = 8
    noise            = 0.08
    contrast         = 0.9
    brightness       = 0.60
    vibrancy         = 0.22
    vibrancy_darkness = 0.3
}

# time
label {
    monitor     = DP-2
    text        = $TIME12
    text_align  = center
    color       = rgba(224, 217, 240, 1.0)
    font_size   = 120
    font_family = JetBrains Mono Bold

    shadow_passes = 2
    shadow_size   = 8
    shadow_color  = rgba(13, 13, 26, 0.8)
    shadow_boost  = 1.2

    position = 0, 320
    halign   = center
    valign   = center
}

# date
label {
    monitor     = DP-2
    text        = cmd[update:60000] echo "$(date +"%A, %B %d")"
    text_align  = center
    color       = rgba(167, 154, 212, 0.9)
    font_size   = 38
    font_family = JetBrains Mono Medium

    shadow_passes = 2
    shadow_size   = 6
    shadow_color  = rgba(13, 13, 26, 0.8)
    shadow_boost  = 1.2

    position = 0, 200
    halign   = center
    valign   = center
}

# shutdown
label {
    monitor     = DP-2
    text        =  Shutdown
    font_family = JetBrains Mono Light
    font_size   = 22
    color       = rgba(214, 153, 182, 0.85)

    shadow_passes = 2
    shadow_size   = 4
    shadow_color  = rgba(13, 13, 26, 0.8)
    shadow_boost  = 1.2

    position = -280, 80
    halign   = center
    valign   = bottom
    onclick  = hyprshutdown -t 'Shutting down...' --post-cmd 'systemctl poweroff'
}

# reboot
label {
    monitor     = DP-2
    text        =  Reboot
    font_family = JetBrains Mono Light
    font_size   = 22
    color       = rgba(214, 153, 182, 0.85)

    shadow_passes = 2
    shadow_size   = 4
    shadow_color  = rgba(13, 13, 26, 0.8)
    shadow_boost  = 1.2

    position = -80, 80
    halign   = center
    valign   = bottom
    onclick  = hyprshutdown -t 'Restarting...' --post-cmd 'systemctl reboot'
}

# suspend
label {
    monitor     = DP-2
    text        = 󰤄 Suspend
    font_family = JetBrains Mono Light
    font_size   = 22
    color       = rgba(214, 153, 182, 0.85)

    shadow_passes = 2
    shadow_size   = 4
    shadow_color  = rgba(13, 13, 26, 0.8)
    shadow_boost  = 1.2

    position = 110, 80
    halign   = center
    valign   = bottom
    onclick  = systemctl suspend
}

# logout
label {
    monitor     = DP-2
    text        =  Logout
    font_family = JetBrains Mono Light
    font_size   = 22
    color       = rgba(214, 153, 182, 0.85)

    shadow_passes = 2
    shadow_size   = 4
    shadow_color  = rgba(13, 13, 26, 0.8)
    shadow_boost  = 1.2

    position = 300, 80
    halign   = center
    valign   = bottom
    onclick  = hyprshutdown
}

input-field {
    monitor          = DP-2
    size             = 400, 60
    outline_thickness = 2
    dots_size        = 0.25
    dots_spacing     = 0.35
    dots_center      = true
    dots_rounding    = -1

    outer_color = rgba(214, 153, 182, 0.6) rgba(167, 154, 212, 0.6) 45deg
    inner_color = rgba(13, 13, 26, 0.6)
    font_color  = rgb(224, 217, 240)

    fade_on_empty  = true
    fade_timeout   = 1500
    rounding       = 10

    check_color = rgba(167, 154, 212, 1.0) rgba(214, 153, 182, 1.0) 45deg
    fail_color  = rgba(224, 107, 122, 1.0)

    placeholder_text = <i><span foreground="##e0d9f0">Enter Password...</span></i>
    fail_text        = <i><span foreground="##e06b7a">$FAIL ($ATTEMPTS)</span></i>

    swap_font_color = true

    position = 0, -40
    halign   = center
    valign   = center

    shadow_passes = 2
    shadow_size   = 8
    shadow_color  = rgba(13, 13, 26, 0.8)
    shadow_boost  = 1.2
}
